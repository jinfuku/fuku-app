<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>生成PWA图标</title>
</head>
<body>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        // SVG源码
        const svgSource = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  <g transform="translate(256, 256) scale(0.8)">
    <path d="M0,-180 Q40,-120 0,-60 Q-40,-120 0,-180" fill="#ffffff" opacity="0.95"/>
    <path d="M0,-40 Q-60,0 -90,40 Q-60,-20 0,-40" fill="#ffffff" opacity="0.85"/>
    <path d="M0,-40 Q60,0 90,40 Q60,-20 0,-40" fill="#ffffff" opacity="0.85"/>
    <path d="M0,20 Q30,80 0,140 Q-30,80 0,20" fill="#ffffff" opacity="0.85"/>
  </g>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
</svg>`;

        // 需要生成的尺寸
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        
        // 创建SVG Blob
        const svgBlob = new Blob([svgSource], {type: 'image/svg+xml;charset=utf-8'});
        const svgUrl = URL.createObjectURL(svgBlob);
        
        // 生成所有尺寸的PNG图标
        const img = new Image();
        img.onload = function() {
            sizes.forEach(size => {
                const canvas = document.getElementById('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                
                // 转换为PNG
                const pngUrl = canvas.toDataURL('image/png');
                
                // 创建下载链接
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = `icon-${size}x${size}.png`;
                a.click();
                
                console.log(`已生成 icon-${size}x${size}.png`);
            });
            
            // 显示完成消息
            document.body.innerHTML = '<h1 style="font-family: Arial; padding: 20px;">✅ 图标生成完成！</h1><p style="font-family: Arial; padding: 20px;">已下载所有尺寸的PNG图标到您的下载文件夹</p><p style="font-family: Arial; padding: 20px;">请将这些图标文件移动到 fuku-app/icons 文件夹中</p>';
        };
        img.src = svgUrl;
    </script>
</body>
</html>
