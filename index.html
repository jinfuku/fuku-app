        // 按分类筛选文章
        function filterCategory(category) {
            currentCategory = category;

            // 更新按钮状态
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 筛选文章
            let filteredArticles = articles;
            if (category !== 'all') {
                filteredArticles = articles.filter(article => article.category === category);
            }

            // 如果有搜索关键词，再进行搜索
            const searchKeyword = document.getElementById('searchInput').value.trim();
            if (searchKeyword) {
                filteredArticles = filteredArticles.filter(article =>
                    article.title.includes(searchKeyword) ||
                    article.summary.includes(searchKeyword)
                );
            }

            renderArticles(filteredArticles);

        function searchArticles() {
            const searchKeyword = document.getElementById('searchInput').value.trim();

            let filteredArticles = articles;
            if (currentCategory !== 'all') {
                filteredArticles = filteredArticles.filter(article => article.category === currentCategory);
            }

            if (searchKeyword) {
                filteredArticles = filteredArticles.filter(article =>

        // 显示相关文章推荐
        function showRelatedArticles(article) {
            let relatedArticles = [];

            // 1. 同系列文章
            if (article.series) {
                articles.forEach(a => {
                    if (a.id !== article.id && a.series === article.series) {
                        relatedArticles.push({...a, reason: '同系列'});
                    }
                });
            }

            // 2. 同标签文章
            if (article.tags) {
                article.tags.forEach(tag => {
                    articles.forEach(a => {
                        if (a.id !== article.id && a.tags && a.tags.includes(tag)) {
                            if (!relatedArticles.find(r => r.id === a.id)) {
                                relatedArticles.push({...a, reason: '同标签'});
                            }
                        }
                    });
                });
            }

            // 3. 同分类文章
            articles.forEach(a => {
                if (a.id !== article.id && a.category === article.category) {
                    if (!relatedArticles.find(r => r.id === a.id)) {
                        relatedArticles.push({...a, reason: '同分类'});
                    }
                }
            });

            // 限制数量
            relatedArticles = relatedArticles.slice(0, 5);

            if (relatedArticles.length === 0) {
                alert('暂无相关文章');
                return;
            }

            const relatedText = relatedArticles.map((a, index) =>
                `${index + 1}. ${a.title}\n   ${a.reason} | ${a.price}`
            ).join('\n\n');

            alert(`相关文章推荐：\n\n${relatedText}`);
        }

    /* ===== 分类底部弹出菜单 ===== */
    var _currentDrawerCat = 'all';

    function openCategoryDrawer() {
      var mask   = document.getElementById('categoryDrawerMask');
      var drawer = document.getElementById('categoryDrawer');
      // 先让元素可见再触发动画
      mask.style.display = 'block';
      drawer.style.display = 'block';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          drawer.style.transform = 'translateY(0)';
          mask.style.opacity = '1';
        });
      });
      // 高亮当前选中分类
      document.querySelectorAll('.drawer-cat-btn').forEach(function(b) {
        b.classList.remove('drawer-cat-active');
      });
      var active = document.getElementById('drawerBtn-' + _currentDrawerCat);
      if (active) active.classList.add('drawer-cat-active');
    }

    function closeCategoryDrawer() {
      var drawer = document.getElementById('categoryDrawer');
      var mask   = document.getElementById('categoryDrawerMask');
      drawer.style.transform = 'translateY(100%)';
      setTimeout(function() {
        drawer.style.display = 'none';
        mask.style.display = 'none';
      }, 280);
    }

    function selectCategoryDrawer(cat) {
      _currentDrawerCat = cat;
      closeCategoryDrawer();
      // 延迟一点，等动画收起后再刷新文章列表
      setTimeout(function() {
        // 同步顶部分类按钮高亮
        document.querySelectorAll('.category-btn').forEach(function(btn) {
          btn.classList.remove('active');
          if (btn.getAttribute('onclick') && btn.getAttribute('onclick').indexOf("'" + cat + "'") !== -1) {
            btn.classList.add('active');
          }
        });
        if (cat === 'all') {
          // "全部" 特殊处理：第一个按钮
          document.querySelector('.category-btn').classList.add('active');
        }
        currentCategory = cat;
        renderArticles(articles);
        // 滚动到文章列表顶部
        var articlesList = document.getElementById('articlesList');
        if (articlesList) articlesList.scrollIntoView({ behavior: 'smooth' });
      }, 300);
    }
